<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RAG Document Assistant</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>📄 RAG Document Assistant</h1>
        <p>Upload PDF files and ask questions about them</p>
      </div>

      <!-- Main Section -->
      <div class="main-section">
        <!-- Upload Section (SMALL) -->
        <div class="upload-section">
          <h2>📤 Upload Documents</h2>

          <div
            class="upload-box"
            onclick="document.getElementById('fileInput').click()"
          >
            <p>➕</p>
            <p>Drag & Drop PDF files here</p>
            <span>or click to select</span>
            <input type="file" id="fileInput" hidden />
          </div>

          <div id="file-list"></div>
          <p id="status"></p>
        </div>

        <!-- Chat Section (BIG) -->
        <div class="chat-section">
          <h2>💬 Ask Questions</h2>

          <div class="chat-box" id="chat-box">
            <div class="message bot">
              👋 Welcome! Upload a PDF first, then ask questions.
            </div>
          </div>

          <div class="input-box">
            <input
              type="text"
              id="question"
              placeholder="Ask a question about your documents..."
            />
            <button onclick="askQuestion()">Send →</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
